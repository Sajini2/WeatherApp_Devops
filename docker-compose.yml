version: '3.8'

services:
  weather-app:
    build: .
    container_name: weather-dashboard
    ports:
      - "8080:80"
    networks:
      - weather-network
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

networks:
  weather-network:
    driver: bridge